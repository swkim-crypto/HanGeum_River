<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>농수로 현장 데이터 조회</title>
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=72f9554b190c352d9c6f36125078178c"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 12px; background: #f0f4f8; color: #2d3748; font-size: 15px; }
    .header { background: #1e3a8a; color: #fff; border-radius: 14px; padding: 16px 18px; margin-bottom: 12px; }
    .header h1 { margin: 0 0 4px; font-size: 1.1rem; }
    .header-meta { font-size: 0.8rem; opacity: 0.8; }
    .refresh-btn { float: right; background: #3b82f6; color: #fff; border: none; padding: 7px 14px; border-radius: 8px; font-size: 0.85rem; font-weight: 700; cursor: pointer; }
    .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
    .stat-card { background: #fff; border-radius: 12px; padding: 12px 10px; text-align: center; box-shadow: 0 2px 6px rgba(0,0,0,0.07); }
    .stat-card .num { font-size: 1.5rem; font-weight: 800; color: #1e3a8a; }
    .stat-card .lbl { font-size: 0.72rem; color: #64748b; margin-top: 2px; }
    .stat-card.warn .num { color: #dc2626; }
    .stat-card.ok   .num { color: #059669; }
    .filter-bar { background: #fff; border-radius: 12px; padding: 10px 12px; margin-bottom: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.07); display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-bar input, .filter-bar select { flex: 1; min-width: 100px; padding: 8px 10px; border: 1.5px solid #cbd5e1; border-radius: 8px; font-size: 0.9rem; background: #f8fafc; }
    .data-card { background: #fff; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.07); overflow: hidden; }
    .card-header { display: flex; justify-content: space-between; align-items: center; padding: 11px 14px; border-bottom: 1px solid #e2e8f0; cursor: pointer; }
    .card-header .ch-id   { font-weight: 800; font-size: 1rem; color: #1e3a8a; }
    .card-header .ch-time { font-size: 0.75rem; color: #94a3b8; }
    .badge { font-size: 0.75rem; font-weight: 700; padding: 3px 9px; border-radius: 20px; }
    .badge-ok   { background: #dcfce7; color: #14532d; }
    .badge-warn { background: #fee2e2; color: #7f1d1d; }
    .card-body { padding: 12px 14px; display: none; }
    .card-body.open { display: block; }
    .measure-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; margin-bottom: 10px; }
    .m-label { font-size: 0.78rem; color: #64748b; }
    .m-val   { font-weight: 700; color: #1e293b; font-size: 0.95rem; }
    .velocity-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; background: #f8fafc; border-radius: 8px; padding: 8px 10px; margin-bottom: 10px; text-align: center; font-size: 0.82rem; }
    .velocity-row .vl { color: #64748b; }
    .velocity-row .vv { font-weight: 700; color: #1e3a8a; }
    .velocity-row .avg-col { background: #dbeafe; border-radius: 6px; padding: 2px 4px; }
    .manning-section { background: #f0fdf4; border-radius: 9px; padding: 10px 12px; margin-bottom: 10px; }
    .manning-section h4 { margin: 0 0 8px; font-size: 0.82rem; color: #047857; }
    .manning-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; font-size: 0.82rem; text-align: center; }
    .mg-item .mg-lbl { color: #6b7280; font-size: 0.72rem; }
    .mg-item .mg-val { font-weight: 700; color: #065f46; }
    .err-row { margin-top: 8px; text-align: center; font-size: 0.85rem; font-weight: 700; padding: 4px; border-radius: 6px; }
    .err-ok   { background: #dcfce7; color: #14532d; }
    .err-warn { background: #fee2e2; color: #7f1d1d; }
    .memo-box { background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; padding: 8px 12px; font-size: 0.85rem; color: #78350f; margin-bottom: 10px; }
    .photo-thumb { width: 100%; max-height: 220px; object-fit: cover; border-radius: 8px; margin-bottom: 8px; display: none; cursor: pointer; }
    .map-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .map-btn { display: block; padding: 10px; border-radius: 8px; text-align: center; font-weight: 700; font-size: 0.85rem; text-decoration: none; cursor: pointer; border: none; width: 100%; }
    .btn-google { background: #4285f4; color: #fff; }
    .btn-kakao  { background: #FEE500; color: #3C1E1E; }
    .kakao-map-wrap { display: none; margin-bottom: 10px; border-radius: 10px; overflow: hidden; border: 1.5px solid #e2e8f0; }
    .kakao-map-container { width: 100%; height: 260px; }
    .heading-badge { display: inline-block; background: #1e3a8a; color: #fff; border-radius: 6px; padding: 2px 8px; font-size: 0.75rem; font-weight: 700; margin-left: 4px; }
    .loading { text-align: center; padding: 40px 20px; color: #64748b; }
    .spinner { width: 32px; height: 32px; border: 3px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { background: #fee2e2; color: #7f1d1d; border-radius: 10px; padding: 16px; text-align: center; margin: 12px 0; }
    .empty-msg { text-align: center; padding: 30px; color: #94a3b8; }
  </style>
</head>
<body>

<div class="header">
  <button class="refresh-btn" onclick="loadData()">🔄 새로고침</button>
  <h1>🌊 농수로 현장 조회</h1>
  <div class="header-meta" id="lastUpdate">불러오는 중…</div>
</div>

<div class="summary-grid">
  <div class="stat-card"><div class="num" id="statTotal">-</div><div class="lbl">전체 측정</div></div>
  <div class="stat-card ok"><div class="num" id="statOk">-</div><div class="lbl">✔ 적합</div></div>
  <div class="stat-card warn"><div class="num" id="statWarn">-</div><div class="lbl">⚠ 재측 필요</div></div>
</div>

<div class="filter-bar">
  <input type="text" id="filterText" placeholder="🔍 수로ID 검색…" oninput="renderCards()">
  <select id="filterJudge" onchange="renderCards()">
    <option value="">전체</option>
    <option value="ok">✔ 적합만</option>
    <option value="warn">⚠ 재측만</option>
  </select>
</div>

<div id="dataContainer">
  <div class="loading"><div class="spinner"></div>데이터 불러오는 중…</div>
</div>

<script>
  const CSV_URL = "https://raw.githubusercontent.com/swkim-crypto/HanGeum_River/main/data.csv";
  const n_coeff = 0.025, S_slope = 0.001, ERR_THR = 10;
  let allRows = [];
  const activeMaps = {};

  // 컬럼: 조사일자,농수로ID,수로폭,수심,높이,유속1,유속2,유속3,평균유속,촬영방위각,특이사항,위도,경도,사진링크
  function parseCSV(text) {
    text = text.replace(/^\uFEFF/, "");
    const lines = text.trim().split("\n").filter(l => l.trim());
    if (lines.length < 2) return [];
    return lines.slice(1).map(line => {
      const c = line.split(",");
      return {
        date:     (c[0]  || "").trim(),
        id:       (c[1]  || "").trim(),
        width:    parseFloat(c[2])  || 0,
        depth:    parseFloat(c[3])  || 0,
        height:   parseFloat(c[4])  || 0,
        v1:       parseFloat(c[5])  || 0,
        v2:       parseFloat(c[6])  || 0,
        v3:       parseFloat(c[7])  || 0,
        velocity: parseFloat(c[8])  || 0,
        heading:  parseFloat(c[9])  || 0,
        memo:     (c[10] || "").trim(),
        lat:      (c[11] || "").trim(),
        lng:      (c[12] || "").trim(),
        photo:    (c[13] || "").trim(),
      };
    }).filter(r => r.id);
  }

  function manning(r) {
    const A = r.width*r.depth, P = r.width+2*r.depth, R = P>0?A/P:0;
    const Q = A*r.velocity;
    const Qm = (1/n_coeff)*A*Math.pow(R,2/3)*Math.pow(S_slope,0.5);
    const errPct = Qm>0?((Q-Qm)/Qm)*100:0;
    return { A, P, R, Q, Qm, errPct, isWarn: Math.abs(errPct)>ERR_THR };
  }

  function headingToDir(deg) {
    const dirs = ["북","북북동","북동","동북동","동","동남동","남동","남남동","남","남남서","남서","서남서","서","서북서","북서","북북서"];
    return dirs[Math.round(deg/22.5)%16];
  }

  async function loadData() {
    document.getElementById("dataContainer").innerHTML = '<div class="loading"><div class="spinner"></div>데이터 불러오는 중…</div>';
    document.getElementById("lastUpdate").textContent = "불러오는 중…";
    try {
      const res = await fetch(CSV_URL + "?t=" + Date.now());
      if (!res.ok) throw new Error("HTTP " + res.status);
      allRows = parseCSV(await res.text()).reverse();
      document.getElementById("lastUpdate").textContent = "업데이트: " + new Date().toLocaleString("ko-KR");
      updateSummary(); renderCards();
    } catch(e) {
      document.getElementById("dataContainer").innerHTML =
        `<div class="error-msg">❌ 데이터를 불러올 수 없습니다.<br><small>${e.message}</small></div>`;
      document.getElementById("lastUpdate").textContent = "불러오기 실패";
    }
  }

  function updateSummary() {
    const warn = allRows.filter(r => manning(r).isWarn).length;
    document.getElementById("statTotal").textContent = allRows.length;
    document.getElementById("statOk").textContent    = allRows.length - warn;
    document.getElementById("statWarn").textContent  = warn;
  }

  function renderCards() {
    const ft = document.getElementById("filterText").value.trim().toLowerCase();
    const fj = document.getElementById("filterJudge").value;
    const rows = allRows.filter(r => {
      if (ft && !r.id.toLowerCase().includes(ft)) return false;
      if (fj) { const w=manning(r).isWarn; if(fj==="warn"&&!w) return false; if(fj==="ok"&&w) return false; }
      return true;
    });
    if (!rows.length) {
      document.getElementById("dataContainer").innerHTML = '<div class="empty-msg">조건에 맞는 데이터가 없습니다.</div>';
      return;
    }
    document.getElementById("dataContainer").innerHTML = rows.map((r,i) => buildCard(r,i)).join("");
  }

  function buildCard(r, idx) {
    const m = manning(r);
    const cardId = "card-"+idx;
    const mapId  = "kmap-"+idx;
    const hBadge = r.heading > 0
      ? `<span class="heading-badge">↑ ${r.heading}° ${headingToDir(r.heading)}</span>` : "";
    const googleUrl = `https://maps.google.com/?q=${r.lat},${r.lng}`;

    return `
    <div class="data-card">
      <div class="card-header" onclick="toggleCard('${cardId}')">
        <div>
          <div class="ch-id">${r.id}${hBadge}</div>
          <div class="ch-time">${r.date}</div>
        </div>
        <span class="badge ${m.isWarn?'badge-warn':'badge-ok'}">${m.isWarn?'⚠ 재측 필요':'✔ 적합'}</span>
      </div>
      <div class="card-body" id="${cardId}">
        <div class="measure-grid">
          <div><div class="m-label">수로 폭 B</div><div class="m-val">${r.width.toFixed(3)} m</div></div>
          <div><div class="m-label">수심 H</div><div class="m-val">${r.depth.toFixed(3)} m</div></div>
          <div><div class="m-label">높이 H'</div><div class="m-val">${r.height.toFixed(3)} m</div></div>
          <div><div class="m-label">실측 유량 Q</div><div class="m-val">${m.Q.toFixed(4)} m³/s</div></div>
        </div>
        <div class="velocity-row">
          <div><div class="vl">1차</div><div class="vv">${r.v1.toFixed(3)}</div></div>
          <div><div class="vl">2차</div><div class="vv">${r.v2.toFixed(3)}</div></div>
          <div><div class="vl">3차</div><div class="vv">${r.v3.toFixed(3)}</div></div>
          <div class="avg-col"><div class="vl">평균</div><div class="vv">${r.velocity.toFixed(3)} m/s</div></div>
        </div>
        ${r.memo?`<div class="memo-box">📝 ${r.memo}</div>`:""}
        <div class="manning-section">
          <h4>📐 매닝 계산 (n=${n_coeff}, S=1/${Math.round(1/S_slope)})</h4>
          <div class="manning-grid">
            <div class="mg-item"><div class="mg-lbl">단면적 A</div><div class="mg-val">${m.A.toFixed(3)} m²</div></div>
            <div class="mg-item"><div class="mg-lbl">윤변 P</div><div class="mg-val">${m.P.toFixed(3)} m</div></div>
            <div class="mg-item"><div class="mg-lbl">경심 R</div><div class="mg-val">${m.R.toFixed(4)} m</div></div>
            <div class="mg-item" style="grid-column:1/3"><div class="mg-lbl">매닝 유량 Qm</div><div class="mg-val">${m.Qm.toFixed(4)} m³/s</div></div>
            <div class="mg-item"><div class="mg-lbl">실측 유량 Q</div><div class="mg-val">${m.Q.toFixed(4)} m³/s</div></div>
          </div>
          <div class="err-row ${m.isWarn?'err-warn':'err-ok'}">
            오차율 ${m.errPct.toFixed(1)}% ${m.isWarn?'— 재측정 검토 필요':'— 측정값 신뢰 가능'}
          </div>
        </div>
        ${r.photo?`<img class="photo-thumb" src="${r.photo}"
          onerror="this.style.display='none'" onload="this.style.display='block'"
          onclick="window.open('${r.photo}','_blank')">`:""}
        ${r.lat&&r.lng?`
        <div class="map-buttons">
          <a class="map-btn btn-google" href="${googleUrl}" target="_blank">🗺 구글맵</a>
          <button class="map-btn btn-kakao" onclick="toggleKakao('${mapId}',${r.lat},${r.lng},${r.heading})">🗺 카카오맵</button>
        </div>
        <div class="kakao-map-wrap" id="wrap-${mapId}">
          <div class="kakao-map-container" id="${mapId}"></div>
        </div>`:""}
      </div>
    </div>`;
  }

  function toggleCard(id) {
    document.getElementById(id).classList.toggle("open");
  }

  function toggleKakao(mapId, lat, lng, heading) {
    const wrap = document.getElementById("wrap-"+mapId);
    // 토글
    if (wrap.style.display === "block") {
      wrap.style.display = "none";
      return;
    }
    wrap.style.display = "block";

    // 이미 생성된 지도면 스킵
    if (activeMaps[mapId]) return;

    const container = document.getElementById(mapId);
    const center    = new kakao.maps.LatLng(lat, lng);

    const map = new kakao.maps.Map(container, {
      center: center,
      level:  4
    });

    // 기본 마커
    new kakao.maps.Marker({ position: center, map: map });

    // 방위각 화살표 커스텀 오버레이
    const arrowHtml = `
      <div style="
        width:36px; height:36px;
        background:#1e3a8a; border:3px solid #fff;
        border-radius:50%; display:flex; align-items:center; justify-content:center;
        box-shadow:0 2px 8px rgba(0,0,0,0.4);
        transform:rotate(${heading}deg);
        font-size:20px; color:#fff; line-height:1; margin-left:-18px; margin-top:-18px;
      ">↑</div>`;

    new kakao.maps.CustomOverlay({
      content:  arrowHtml,
      position: center,
      zIndex:   4
    }).setMap(map);

    // 인포윈도우
    const info = new kakao.maps.InfoWindow({
      content: `<div style="padding:6px 10px;font-size:12px;line-height:1.6;">
        <b>${lat}, ${lng}</b><br>
        방위각: ${heading}° (${headingToDir(heading)})
      </div>`,
      removable: true
    });

    kakao.maps.event.addListener(
      new kakao.maps.Marker({ position: center, map: map }),
      'click', () => info.open(map, this)
    );

    activeMaps[mapId] = map;
  }

  loadData();
</script>
</body>
</html>
